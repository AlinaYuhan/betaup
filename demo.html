<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetaUp — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --summit:  #ff7a18;
  --moss:    #5ed9a6;
  --sky:     #7be0ff;
  --accent:  #f0a500;
  --body:    #c8c5bc;
  --muted:   #a09d95;
  --dim:     #46443f;
  --border:  #1c1e24;
  --pw: 370px;
  --ph: 802px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; overflow: hidden; color: #f0ede8; font-family: 'DM Sans', sans-serif; }

body {
  background:
    radial-gradient(ellipse 60% 50% at 25% 50%, rgba(255,122,24,0.055) 0%, transparent 65%),
    radial-gradient(ellipse 50% 60% at 80% 30%, rgba(123,224,255,0.03) 0%, transparent 60%),
    #06070a;
}

/* ── LAYOUT ─────────────────────────────── */
.demo-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* ── LEFT PANEL ──────────────────────────── */
.panel-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 2.4rem 3rem;
  position: relative;
  overflow: hidden;
  /* Subtle right-edge fade instead of hard line */
}
.panel-left::after {
  content: '';
  position: absolute;
  right: 0; top: 10%; bottom: 10%;
  width: 1px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(255,255,255,0.04) 30%,
    rgba(255,255,255,0.04) 70%,
    transparent);
  pointer-events: none;
}

/* top bar */
.pl-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  flex-shrink: 0;
}
.pl-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.22em;
  color: var(--summit);
}
.pl-meta {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
}

/* counter */
.pl-counter {
  display: flex;
  align-items: baseline;
  gap: 0.25rem;
  position: absolute;
  top: 2.4rem;
  right: 3rem;
}
.pl-cur {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  color: var(--summit);
  letter-spacing: 0.04em;
}
.pl-sep, .pl-tot {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--dim);
}

/* ── SCENE CONTENT (centered) ──────────── */
.scene-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  width: 100%;
  padding: 1rem 0;
  will-change: opacity, transform;
  transition: opacity 0.32s ease, transform 0.32s ease;
}
.scene-content.out   { opacity: 0; transform: translateY(16px); }
.scene-content.enter { opacity: 0; transform: translateY(-16px); transition: none !important; }
.scene-content.show  { opacity: 1; transform: translateY(0); transition: opacity 0.38s ease, transform 0.38s ease; }

/* tag */
.sc-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--summit);
  margin-bottom: 2.8rem;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.05s forwards;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.sc-tag::before {
  content: '';
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--summit);
  flex-shrink: 0;
  animation: pulse 2.4s ease-in-out infinite;
}

/* title */
.sc-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.2rem, 5.8vw, 5.4rem);
  line-height: 0.90;
  letter-spacing: 0.02em;
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 0.45s ease 0.12s forwards;
}
.sc-title em { color: var(--summit); font-style: normal; }

/* lines */
.sc-lines {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 1.6rem;
  align-items: center;
}
.sc-line {
  font-size: 0.88rem;
  color: var(--body);
  font-weight: 400;
  opacity: 0;
  animation: fadeUp 0.4s ease forwards;
}

/* Feature spotlight — replaced per step */
.step-pre {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.9rem, 3.2vw, 2.8rem);
  line-height: 1.1;
  letter-spacing: 0.06em;
  color: rgba(240,237,232,0.25);
  opacity: 0;
  animation: fadeUp 0.36s ease 0.06s both;
}
.step-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4.4rem, 7.4vw, 7rem);
  line-height: 0.85;
  letter-spacing: 0.01em;
  color: #f0ede8;
  opacity: 0;
  animation: fadeUp 0.44s ease 0.14s both;
}
.step-main em { color: var(--summit); font-style: normal; }
.step-sep {
  width: 44px; height: 1.5px;
  background: linear-gradient(90deg, var(--summit) 0%, rgba(255,122,24,0.2) 100%);
  border-radius: 1px;
  margin: 1.4rem 0 1.3rem;
  opacity: 0;
  animation: fadeUp 0.28s ease 0.3s both;
}
.step-desc {
  font-size: 0.98rem;
  color: var(--body);
  line-height: 1.72;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.4s both;
  max-width: 360px;
  text-align: center;
}

/* voiceover reference */
.sc-vo {
  margin-top: 0.5rem;
  padding: 0.7rem 1.2rem;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 4px;
  font-size: 0.76rem;
  color: var(--dim);
  font-style: italic;
  line-height: 1.65;
  max-width: 340px;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.55s forwards;
}

/* chips */
.sc-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  margin-top: 0.2rem;
}
.chip {
  font-family: 'Space Mono', monospace;
  font-size: 0.51rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.24rem 0.64rem;
  border-radius: 2px;
  opacity: 0;
  animation: chipIn 0.3s ease forwards;
}
.c-o { background: rgba(255,122,24,0.09);  color: var(--summit); border: 1px solid rgba(255,122,24,0.25); }
.c-g { background: rgba(94,217,166,0.07);  color: var(--moss);   border: 1px solid rgba(94,217,166,0.2); }
.c-b { background: rgba(123,224,255,0.07); color: var(--sky);    border: 1px solid rgba(123,224,255,0.2); }
.c-y { background: rgba(240,165,0,0.09);   color: var(--accent); border: 1px solid rgba(240,165,0,0.22); }

/* ── CONTROLS ────────────────────────────── */
.panel-controls {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* progress bar */
.progress-bar {
  height: 1px;
  width: 100%;
  background: rgba(255,255,255,0.06);
  margin-bottom: 1.2rem;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0%;
  background: var(--summit);
}

/* dots */
.dots-row {
  display: flex;
  gap: 7px;
  margin-bottom: 1rem;
}
.sdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.sdot.on { background: var(--summit); transform: scale(1.5); }

/* buttons */
.ctrl-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 0.7rem;
}
.ctrl-btn {
  font-family: 'Space Mono', monospace;
  font-size: 0.54rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.48rem 0.95rem;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.ctrl-btn:hover { border-color: #444; color: #ddd; }
.ctrl-btn.primary { background: var(--summit); border-color: var(--summit); color: #fff; }
.ctrl-btn.primary:hover { opacity: 0.85; }
.ctrl-btn.paused  { background: transparent; border-color: var(--border); color: var(--dim); }

.kb-hint {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.1em;
  color: var(--dim);
  text-align: center;
  line-height: 1.8;
}

/* ── RIGHT PANEL ─────────────────────────── */
.panel-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  position: relative;
  overflow: hidden;
  padding-top: 5rem;
}

.screen-tab {
  position: absolute;
  top: 2rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  padding: 0.28rem 0.8rem;
  border-radius: 2px;
  z-index: 5;
  transition: opacity 0.3s;
}
.screen-tab-arrow { color: var(--summit); margin-right: 4px; }

.phone-hint {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  position: relative;
  z-index: 2;
}

/* ── PHONE MOCKUP ────────────────────────── */
.phone {
  width: var(--pw); height: var(--ph);
  position: relative; flex-shrink: 0; z-index: 2;
}
.phone-shell {
  width: 100%; height: 100%;
  border-radius: 46px;
  background: linear-gradient(160deg, #28303e 0%, #1a1f2c 50%, #131720 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.10),
    0 0 0 1px rgba(140,150,170,0.40),
    0 0 0 2.5px rgba(80,90,110,0.25),
    0 0 0 4px #050508,
    0 80px 150px rgba(0,0,0,0.85),
    0 0 90px rgba(255,122,24,0.09);
  padding: 10px 8px 14px;
  display: flex; flex-direction: column;
}
.phone-screen {
  flex: 1; border-radius: 38px; overflow: hidden;
  background: #080c14; position: relative;
}
.phone-iframe-wrap { position: absolute; inset: 0; overflow: hidden; }
.phone-iframe-wrap iframe {
  width: 390px; height: 852px;
  border: none; display: block;
  transform: scale(0.908); transform-origin: top left;
}
.ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem; padding: 2rem; text-align: center;
  background: linear-gradient(160deg, #0f1928, #08111f);
  pointer-events: none; transition: opacity 0.5s;
}
.ph.hidden { opacity: 0; pointer-events: none; }
.ph-logo { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; letter-spacing:.1em; color:var(--summit); }
.ph-dot  { width:8px; height:8px; border-radius:50%; background:var(--summit); animation:pulse 2s ease-in-out infinite; }
.ph-hint { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; color:var(--dim); line-height:1.9; }
.phone-home-bar {
  width:80px; height:3px; border-radius:2px;
  background:rgba(255,255,255,0.22); margin:7px auto 0; flex-shrink:0;
}
.pbtn {
  position:absolute; border-radius:3px;
  background:linear-gradient(to right,#222736,#1a1f2c);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 0 0 1px rgba(140,150,170,0.22);
}
.pbtn-v1{left:-5px;top:108px;width:4px;height:36px;}
.pbtn-v2{left:-5px;top:154px;width:4px;height:36px;}
.pbtn-pw{right:-5px;top:128px;width:4px;height:62px;}
.phone-sheen {
  position:absolute;inset:0;border-radius:46px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 40%);
}

/* ── ANIMATIONS ──────────────────────────── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes chipIn  { to{opacity:1} }
@keyframes pulse   { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.25)} }

/* ── PHONE AREA (watch + phone side-by-side) ─ */
.phone-area {
  display: flex;
  align-items: center;
  gap: 44px;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

/* ── APPLE WATCH MOCKUP ──────────────────────── */
.awatch-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}

.aw-band-top, .aw-band-bot {
  width: 110px;
  height: 58px;
  background: linear-gradient(180deg, #b84500 0%, #d85200 40%, #c04800 100%);
  border-radius: 7px 7px 0 0;
  position: relative;
  overflow: hidden;
  z-index: 1;
  margin-bottom: -14px; /* slide under case top edge */
}
.aw-band-bot {
  height: 72px;
  border-radius: 0 0 20px 20px;
  background: linear-gradient(180deg, #c04800 0%, #d85200 60%, #b84500 100%);
  margin-bottom: 0;
  margin-top: -14px; /* slide under case bottom edge */
}
.aw-band-top::before, .aw-band-bot::before {
  content: '';
  position: absolute;
  inset: 8px 20px;
  background: repeating-linear-gradient(
    to right, transparent, transparent 4px,
    rgba(0,0,0,0.14) 4px, rgba(0,0,0,0.14) 5px
  );
  border-radius: 2px;
}

.aw-case {
  width: 144px;
  height: 168px;
  border-radius: 44px;
  background: linear-gradient(150deg, #3c4150 0%, #2c3040 45%, #1e2230 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.09),
    0 0 0 1.5px rgba(108,118,145,0.55),
    0 0 0 3px rgba(48,53,68,0.7),
    0 24px 60px rgba(0,0,0,0.80),
    0 0 50px rgba(255,122,24,0.06);
  padding: 9px;
  position: relative;
  flex-shrink: 0;
  z-index: 2;
}

/* Digital crown */
.aw-crown {
  position: absolute;
  right: -8px; top: 46px;
  width: 8px; height: 28px;
  border-radius: 4px;
  background: linear-gradient(to right, #2c3040 0%, #505868 55%, #3a4050 100%);
  box-shadow: 2px 0 5px rgba(0,0,0,0.6);
}
.aw-crown::after {
  content: '';
  position: absolute;
  inset: 4px 2px;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.13) 0px, rgba(255,255,255,0.13) 1px,
    transparent 1px, transparent 2.5px
  );
  border-radius: 2px;
}

/* Side button */
.aw-side-btn {
  position: absolute;
  right: -6px; top: 82px;
  width: 6px; height: 14px;
  border-radius: 2px;
  background: linear-gradient(to right, #222836, #40485a);
  box-shadow: 2px 0 4px rgba(0,0,0,0.55);
}

/* Screen */
.aw-screen {
  width: 100%; height: 100%;
  border-radius: 36px;
  background: #000;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 9px 9px 7px;
}
.aw-screen::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 36px;
  background: radial-gradient(ellipse 90% 70% at 50% 18%,
    rgba(94,217,166,0.09) 0%, transparent 65%);
  pointer-events: none; z-index: 10;
}

/* Watch content */
.aw-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.aw-activity-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(94,217,166,0.88);
}
.aw-ble-ind { display: flex; align-items: center; gap: 3px; }
.aw-ble-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #7be0ff;
  animation: awBlePulse 1.5s ease-in-out infinite;
}
.aw-ble-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 5.5px; letter-spacing: 0.1em;
  color: rgba(123,224,255,0.62);
}

.aw-bpm-row {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 3px; flex-shrink: 0;
}
.aw-heart {
  font-size: 14px; line-height: 1; color: #ff4060;
  display: inline-block;
  animation: awHeartbeat 0.43s ease-in-out infinite;
}
.aw-bpm-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 33px; line-height: 1; color: #fff; letter-spacing: 0.01em;
}
.aw-bpm-unit {
  font-family: 'Space Mono', monospace;
  font-size: 7px; color: rgba(255,255,255,0.32);
  letter-spacing: 0.12em; align-self: flex-end; padding-bottom: 4px;
}

.aw-ecg-wrap {
  flex: 1; position: relative; overflow: hidden;
  margin: 2px 0; min-height: 30px;
}
#aw-ecg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

.aw-stats {
  display: flex; justify-content: space-between;
  padding-top: 5px;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.aw-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.aw-stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; color: #fff; letter-spacing: 0.05em; line-height: 1;
}
.aw-stat-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 5px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.26);
}

/* BLE connected label below watch */
.aw-conn-label {
  margin-top: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.45rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(123,224,255,0.42);
  display: flex; align-items: center; gap: 5px;
}
.aw-conn-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #7be0ff;
  animation: awBlePulse 1.5s ease-in-out 0.75s infinite;
}

@keyframes awHeartbeat {
  0%,100% { transform: scale(1);    opacity: 0.75; }
  18%      { transform: scale(1.35); opacity: 1;    }
  36%      { transform: scale(1);    opacity: 0.80; }
  54%      { transform: scale(1.18); opacity: 0.95; }
  72%      { transform: scale(1);    opacity: 0.78; }
}
@keyframes awBlePulse {
  0%,100% { opacity: 0.28; transform: scale(0.82); }
  50%      { opacity: 1;    transform: scale(1.25); }
}

/* responsive phone scale */
@media (max-height: 860px) { .phone-area { transform: scale(0.84); transform-origin: center; } }
@media (max-height: 720px) { .phone-area { transform: scale(0.70); transform-origin: center; } }

/* ── STEP CHIPS ──────────────────────────── */
.step-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1.4rem;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.52s both;
}
.step-chip {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  padding: 0.28rem 0.7rem;
}

/* ── CLIMBING DECORATIONS ─────────────────── */
/* Subtle hold-shape texture on left panel */
.panel-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse 18px 12px at 82% 12%, rgba(255,122,24,0.05) 0%, transparent 100%),
    radial-gradient(ellipse 12px 18px at 10% 58%, rgba(255,122,24,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 22px 14px at 90% 80%, rgba(255,255,255,0.02) 0%, transparent 100%),
    radial-gradient(ellipse 9px  9px  at 30% 90%, rgba(255,122,24,0.03) 0%, transparent 100%);
  pointer-events: none;
}


</style>
</head>
<body>
<div class="demo-wrap">

  <!-- ══ LEFT PANEL ══════════════════════════ -->
  <div class="panel-left">

    <div class="pl-top">
      <div class="pl-logo">BetaUp</div>
    </div>

    <!-- Animated scene -->
    <div class="scene-content show" id="scene-content">
      <div class="sc-tag"   id="sc-tag"></div>
      <h2  class="sc-title" id="sc-title"></h2>
      <div class="sc-lines" id="sc-lines"></div>
      <div class="sc-vo"    id="sc-vo"></div>
      <div class="sc-chips" id="sc-chips"></div>
    </div>

    <!-- Controls -->
    <div class="panel-controls">
      <div class="dots-row" id="dots-row"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-prev">← Prev</button>
        <button class="ctrl-btn primary" id="btn-auto">⏸ Pause</button>
        <button class="ctrl-btn" id="btn-next">Next →</button>
      </div>
    </div>

  </div>

  <!-- ══ RIGHT PANEL ═════════════════════════ -->
  <div class="panel-right">
    <div class="phone-area">

      <!-- Apple Watch -->
      <div class="awatch-wrap">
        <div class="aw-band-top"></div>
        <div class="aw-case">
          <div class="aw-screen">
            <div class="aw-header">
              <span class="aw-activity-lbl">CLIMBING</span>
              <span class="aw-ble-ind">
                <span class="aw-ble-dot"></span>
                <span class="aw-ble-lbl">BLE</span>
              </span>
            </div>
            <div class="aw-bpm-row">
              <span class="aw-heart" id="aw-heart">♥</span>
              <span class="aw-bpm-num" id="aw-bpm">138</span>
              <span class="aw-bpm-unit">BPM</span>
            </div>
            <div class="aw-ecg-wrap">
              <canvas id="aw-ecg"></canvas>
            </div>
            <div class="aw-stats">
              <div class="aw-stat">
                <span class="aw-stat-val" id="aw-time">00:00</span>
                <span class="aw-stat-lbl">TIME</span>
              </div>
              <div class="aw-stat">
                <span class="aw-stat-val" id="aw-cal">0</span>
                <span class="aw-stat-lbl">CAL</span>
              </div>
              <div class="aw-stat">
                <span class="aw-stat-val" id="aw-zone" style="color:#f0a500">Z3</span>
                <span class="aw-stat-lbl">ZONE</span>
              </div>
            </div>
          </div>
          <div class="aw-crown"></div>
          <div class="aw-side-btn"></div>
        </div>
        <div class="aw-band-bot"></div>
        <div class="aw-conn-label">
          <span class="aw-conn-dot"></span>BLE Connected
        </div>
      </div>

      <!-- Phone -->
      <div class="phone">
        <div class="phone-shell">
          <div class="phone-screen">
            <div class="phone-iframe-wrap">
              <iframe id="app-frame" src="./app/index.html" title="BetaUp"></iframe>
              <div class="ph" id="app-ph">
                <div class="ph-logo">BETAUP</div>
                <div class="ph-dot"></div>
                <p class="ph-hint">Loading app…</p>
              </div>
            </div>
          </div>
          <div class="phone-home-bar"></div>
        </div>
        <div class="pbtn pbtn-v1"></div>
        <div class="pbtn pbtn-v2"></div>
        <div class="pbtn pbtn-pw"></div>
        <div class="phone-sheen"></div>
      </div>

    </div><!-- /.phone-area -->

  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  MODULES  (3 manual panels; steps auto-advance within each)
// ═══════════════════════════════════════════
const MODULES = [
  {
    tag: 'Explore · Achievements',
    steps: [
      { pre: 'GYM', main: '<em>MAP</em>', desc: 'All venues · GPS-sorted by distance · open hours · booking', chips: ['700+ Venues','GPS Sort','Open Hours'], dur: 3400 },
      { pre: 'GPS', main: 'CHECK-IN', desc: 'Arrive at the wall · one tap confirms your session start', chips: ['One Tap','Auto Log','Session Start'], dur: 3200 },
      { main: 'BADGE <em>UNLOCKED</em>', desc: 'First Check-In — milestone captured and celebrated automatically', chips: ['Milestone','Confetti','Push Notify'], dur: 3400 },
      { pre: 'YOUR', main: 'BADGE WALL', desc: '20+ achievements · every milestone lives here forever', chips: ['20+ Badges','Public Profile','Showcase'], dur: 3400 },
    ]
  },
  {
    tag: 'AI Voice · Panda',
    steps: [
      { pre: 'START', main: 'SESSION', desc: 'Just say it · Panda begins your training log instantly', chips: ['Voice First','DeepSeek NLP','Instant'], dur: 3000 },
      { pre: 'LOG EVERY', main: '<em>CLIMB</em>', desc: '"V5, red route, flash" — both hands stay on the wall', chips: ['Hands-Free','V-Grade','Flash / Redpoint'], dur: 3200 },
      { pre: 'QUERY', main: 'YOUR DATA', desc: 'Best grade · session count · streaks · ask anything', chips: ['Best Grade','Streaks','Session History'], dur: 3000 },
      { pre: 'CLIMBING', main: '<em>COACH</em>', desc: 'Technique · route beta · training advice · on demand', chips: ['Technique','Route Beta','Training Plan'], dur: 3200 },
      { main: 'ZERO <em>FRICTION</em>', desc: 'No screen · no typing · just climbing · just flow', chips: ['No Screen','No Typing','Flow State'], dur: 3000 },
    ]
  },
  {
    tag: 'Community',
    steps: [
      { pre: '3 POST', main: 'TYPES', desc: 'General · Partner Search · Beta Route — pick your format', chips: ['General','Partner Search','Beta Route'], dur: 3200 },
      { pre: 'COMMUNITY', main: '<em>FEED</em>', desc: 'Likes · comments · celebrate every send together', chips: ['Likes','Comments','Celebrate Sends'], dur: 3200 },
      { pre: 'COACH', main: 'CERTS', desc: 'Coaches verify your achievements in-app · officially', chips: ['Certified Coach','In-App Review','Official Badge'], dur: 3400 },
    ]
  },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let curMod   = 0;
let curStep  = 0;
let stepTimer = null;
let busy     = false;

const contentEl = document.getElementById('scene-content');
const tagEl     = document.getElementById('sc-tag');
const titleEl   = document.getElementById('sc-title');
const linesEl   = document.getElementById('sc-lines');
const voEl      = document.getElementById('sc-vo');
const chipsEl   = document.getElementById('sc-chips');
const dotsRow   = document.getElementById('dots-row');
const btnAuto   = document.getElementById('btn-auto');

voEl.style.display    = 'none';
btnAuto.style.display = 'none';
titleEl.style.display = 'none';

// ── 3 module dots ──
MODULES.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'sdot' + (i===0?' on':'');
  d.addEventListener('click', () => goToMod(i));
  dotsRow.appendChild(d);
});

// ── Step dots container ──
const stepDotsEl = document.createElement('div');
stepDotsEl.style.cssText = 'display:flex;gap:7px;justify-content:center;margin-top:1.4rem;';
contentEl.appendChild(stepDotsEl);

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderMod(modIdx) {
  const m = MODULES[modIdx];
  tagEl.textContent = m.tag;
  chipsEl.innerHTML = '';
  document.querySelectorAll('.sdot').forEach((d,i) =>
    d.classList.toggle('on', i===modIdx)
  );
  // Rebuild step dots
  stepDotsEl.innerHTML = m.steps.map((_,i) =>
    `<span style="width:4px;height:4px;border-radius:50%;display:inline-block;` +
    `background:${i===0?'var(--summit)':'var(--border)'};` +
    `transition:background .3s,transform .3s;` +
    `transform:${i===0?'scale(1.5)':'scale(1)'}"></span>`
  ).join('');
  curStep = 0;
  renderStep(0);
}

function renderStep(stepIdx) {
  curStep = stepIdx;
  const step = MODULES[curMod].steps[stepIdx];
  // Highlight active step dot
  stepDotsEl.querySelectorAll('span').forEach((d,i) => {
    d.style.background = i===stepIdx ? 'var(--summit)' : 'var(--border)';
    d.style.transform  = i===stepIdx ? 'scale(1.5)' : 'scale(1)';
  });
  // Replace content — animations restart on each DOM replace
  const chipsHtml = step.chips
    ? `<div class="step-chips">${step.chips.map(c => `<span class="step-chip">${c}</span>`).join('')}</div>`
    : '';
  linesEl.innerHTML =
    (step.pre ? `<div class="step-pre">${step.pre}</div>` : '') +
    `<div class="step-main">${step.main}</div>` +
    `<div class="step-sep"></div>` +
    `<p class="step-desc">${step.desc}</p>` +
    chipsHtml;
  scheduleNext(step.dur);
}

// ═══════════════════════════════════════════
//  STEP TIMER (auto-advance within module, loops)
// ═══════════════════════════════════════════
function scheduleNext(dur) {
  if (stepTimer) clearTimeout(stepTimer);
  stepTimer = setTimeout(() => {
    renderStep((curStep + 1) % MODULES[curMod].steps.length);
  }, dur);
}

function stopTimer() {
  if (stepTimer) { clearTimeout(stepTimer); stepTimer = null; }
}

// ═══════════════════════════════════════════
//  MODULE NAVIGATION (manual only)
// ═══════════════════════════════════════════
function goToMod(idx) {
  if (busy) return;
  idx = ((idx % MODULES.length) + MODULES.length) % MODULES.length;
  if (idx === curMod) return;
  busy = true;
  stopTimer();

  contentEl.classList.remove('show');
  contentEl.classList.add('out');

  setTimeout(() => {
    curMod = idx;
    renderMod(curMod);
    contentEl.classList.remove('out');
    contentEl.classList.add('enter');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      contentEl.classList.remove('enter');
      contentEl.classList.add('show');
      busy = false;
    }));
  }, 340);
}

document.getElementById('btn-prev').addEventListener('click', () => goToMod(curMod-1));
document.getElementById('btn-next').addEventListener('click', () => goToMod(curMod+1));

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.code==='ArrowRight'||e.code==='Space') { e.preventDefault(); goToMod(curMod+1); }
  else if (e.code==='ArrowLeft')               { e.preventDefault(); goToMod(curMod-1); }
});


// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderMod(0);
contentEl.classList.add('show');

document.getElementById('app-frame').addEventListener('load', function() {
  const frame = this;
  const ph = document.getElementById('app-ph');
  function hidePh() { ph.classList.add('hidden'); }
  // Poll for Flutter canvas — give 1.2s after detection for Flutter to paint
  const poll = setInterval(() => {
    try {
      const doc = frame.contentDocument;
      if (doc && doc.querySelector('canvas, flt-glass-pane')) {
        clearInterval(poll);
        setTimeout(hidePh, 1200);
      }
    } catch(e) {
      // Cross-origin — fall through to the timeout below
    }
  }, 600);
  // Fallback: hide after 40s regardless (WASM first-time compile can be slow)
  setTimeout(() => { clearInterval(poll); hidePh(); }, 40000);
});

// ═══════════════════════════════════════════
//  APPLE WATCH SIMULATION
// ═══════════════════════════════════════════
(function() {
  const heartEl = document.getElementById('aw-heart');
  const bpmEl   = document.getElementById('aw-bpm');
  const timeEl  = document.getElementById('aw-time');
  const calEl   = document.getElementById('aw-cal');
  const zoneEl  = document.getElementById('aw-zone');
  const canvas  = document.getElementById('aw-ecg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // ── State ──
  let bpm       = 128;
  let ecgPhase  = 0;    // 0–1, position in cardiac cycle
  let calories  = 0;
  let sessionStart = Date.now();
  let lastTs    = null;

  // Clock-based BPM — same formula as Flutter MockHeartRateSimulator._nextBpm()
  function clockBpm() {
    return Math.round(128 + 15 * Math.sin(Date.now() / 20000 * 2 * Math.PI));
  }

  // ── PQRST waveform ──
  function ecgSample(t) {
    if (t < 0.18) {
      const u = (t - 0.09) / 0.09;
      return 0.15 * Math.exp(-u * u * 5);      // P wave
    }
    if (t < 0.26) return 0;                    // PR flat
    if (t < 0.30) return -0.13 * Math.sin((t - 0.26) / 0.04 * Math.PI); // Q
    if (t < 0.40) {                            // R peak
      const u = (t - 0.30) / 0.10;
      return u < 0.45 ? u / 0.45 : (1 - u) / 0.55;
    }
    if (t < 0.44) return -0.10 * Math.sin((t - 0.40) / 0.04 * Math.PI); // S
    if (t < 0.62) return 0.03;                // ST elevated
    if (t < 0.88) {                            // T wave
      const u = (t - 0.75) / 0.13;
      return 0.24 * Math.exp(-u * u * 4);
    }
    return 0;                                   // TP flat
  }

  // ── Zone color ──
  function zoneFor(b) {
    if (b < 115) return ['Z1','#7be0ff'];
    if (b < 134) return ['Z2','#5ed9a6'];
    if (b < 153) return ['Z3','#f0a500'];
    if (b < 172) return ['Z4','#ff7a18'];
    return ['Z5','#ff4060'];
  }

  // ── Draw ECG ──
  function drawEcg() {
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    ctx.clearRect(0, 0, W, H);

    // Faint grid
    ctx.strokeStyle = 'rgba(94,217,166,0.06)';
    ctx.lineWidth = 0.5;
    for (let gx = 0; gx < W; gx += 18) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, H * 0.5); ctx.lineTo(W, H * 0.5); ctx.stroke();

    // ECG trace — canvas width = last 3 seconds; right edge = now
    const secondsShown = 3;
    const beatsShown   = secondsShown * bpm / 60;
    const midY = H * 0.52;
    const amp  = H * 0.40;

    ctx.beginPath();
    ctx.lineWidth = 1.6;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(94,217,166,0.92)';
    for (let px = 0; px < W; px++) {
      const phaseDelta = (W - px) / W * beatsShown;
      const phase = ((ecgPhase - phaseDelta) % 1 + 1) % 1;
      const y = midY - ecgSample(phase) * amp;
      px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
    }
    ctx.stroke();

    // Left-edge fade (old data fades to black)
    const grad = ctx.createLinearGradient(0, 0, W * 0.18, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0.92)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W * 0.18, H);
  }

  // ── rAF loop ──
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.05); // seconds, capped
    lastTs = ts;

    // Sync BPM with wall clock — matches Flutter's formula exactly
    bpm = clockBpm();

    // Advance ECG phase (beats per second = bpm/60)
    ecgPhase = (ecgPhase + bpm / 60 * dt) % 1;

    // Update BPM display
    const bpmInt = Math.round(bpm);
    if (bpmEl.textContent !== String(bpmInt)) {
      bpmEl.textContent = bpmInt;
      heartEl.style.animationDuration = (60 / bpm).toFixed(3) + 's';
      const [zLabel, zColor] = zoneFor(bpm);
      zoneEl.textContent = zLabel;
      zoneEl.style.color = zColor;
    }

    drawEcg();
    requestAnimationFrame(loop);
  }

  // ── Timers ──
  setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    timeEl.textContent =
      String(Math.floor(elapsed / 60)).padStart(2,'0') + ':' +
      String(elapsed % 60).padStart(2,'0');
    calories += 0.167; // ~10 cal/min
    calEl.textContent = Math.floor(calories);
  }, 1000);

  // ── Push BPM to Flutter iframe every 500ms ──
  setInterval(() => {
    try {
      document.getElementById('app-frame').contentWindow.demoBpm = Math.round(bpm);
    } catch(_) {}
  }, 500);

  // ── Init after layout ──
  requestAnimationFrame(() => {
    canvas.width  = canvas.offsetWidth  || 112;
    canvas.height = canvas.offsetHeight || 36;
    heartEl.style.animationDuration = (60 / bpm).toFixed(3) + 's';
    requestAnimationFrame(loop);
  });
})();
</script>
