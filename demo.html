<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetaUp — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --rock:    #0b0b0d;
  --chalk:   #f5f4f0;
  --summit:  #ff7a18;
  --moss:    #5ed9a6;
  --sky:     #7be0ff;
  --granite: #7a7870;
  --accent:  #f0a500;
  --surface: #141416;
  --border:  #1e2026;
  --body:    #c8c5bc;
  --muted:   #a09d95;
  --dim:     #4e4c48;
  --pw: 370px;
  --ph: 802px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100vh;
  overflow: hidden;
  background: #07070a;
  color: var(--chalk);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
}

/* ── SPLIT LAYOUT ────────────────────────── */
.demo-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* ── LEFT PANEL ──────────────────────────── */
.panel-left {
  display: flex;
  flex-direction: column;
  padding: 2.8rem 4rem;
  background:
    radial-gradient(ellipse 70% 55% at 10% 90%, rgba(255,122,24,0.05) 0%, transparent 65%),
    #07070a;
  border-right: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

/* subtle grid texture */
.panel-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* top row */
.pl-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  margin-bottom: 2.2rem;
  position: relative;
  z-index: 1;
}
.pl-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.22em;
  color: var(--summit);
}
.pl-meta {
  font-family: 'Space Mono', monospace;
  font-size: 0.54rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
}
.pl-portfolio {
  font-family: 'Space Mono', monospace;
  font-size: 0.54rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.pl-portfolio:hover { color: var(--chalk); border-bottom-color: var(--chalk); }

/* counter */
.pl-counter {
  display: flex;
  align-items: baseline;
  gap: 0.3rem;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  margin-bottom: 0.2rem;
}
.pl-cur {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  color: var(--summit);
  letter-spacing: 0.04em;
  line-height: 1;
}
.pl-sep, .pl-tot {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--dim);
}

/* ── SCENE CONTENT (animated area) ────────── */
.scene-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 1;
  will-change: opacity, transform;
}
.scene-content.out {
  opacity: 0 !important;
  transform: translateX(-28px) !important;
}
.scene-content.in-from-right {
  opacity: 0;
  transform: translateX(28px);
  transition: none !important;
}
.scene-content.in-from-left {
  opacity: 0;
  transform: translateX(-28px);
  transition: none !important;
}
.scene-content.settled {
  opacity: 1;
  transform: translateX(0);
  transition: opacity 0.38s ease, transform 0.38s ease;
}

.sc-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--summit);
  display: flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 1.1rem;
}
.sc-tag::before {
  content: '';
  width: 22px;
  height: 1px;
  background: var(--summit);
  flex-shrink: 0;
}

.sc-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 5.5vw, 5.2rem);
  line-height: 0.91;
  letter-spacing: 0.02em;
  margin-bottom: 1.8rem;
}
.sc-title em { color: var(--summit); font-style: normal; }

.sc-lines {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 1.6rem;
}
.sc-line {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  font-size: 0.9rem;
  color: var(--body);
  font-weight: 400;
  opacity: 0;
  transform: translateY(10px);
  animation: lineIn 0.42s ease forwards;
}
.sc-line::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--summit);
  opacity: 0.45;
  flex-shrink: 0;
}

.sc-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.chip {
  font-family: 'Space Mono', monospace;
  font-size: 0.53rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.26rem 0.68rem;
  border-radius: 2px;
  opacity: 0;
  animation: chipIn 0.3s ease forwards;
}
.c-o { background: rgba(255,122,24,0.09);  color: var(--summit); border: 1px solid rgba(255,122,24,0.28); }
.c-g { background: rgba(94,217,166,0.07);  color: var(--moss);   border: 1px solid rgba(94,217,166,0.22); }
.c-b { background: rgba(123,224,255,0.07); color: var(--sky);    border: 1px solid rgba(123,224,255,0.22); }
.c-y { background: rgba(240,165,0,0.09);   color: var(--accent); border: 1px solid rgba(240,165,0,0.26); }

/* ── BOTTOM CONTROLS ─────────────────────── */
.panel-controls {
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

/* thin progress bar */
.progress-bar {
  height: 1px;
  background: var(--border);
  margin-bottom: 1.4rem;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0%;
  background: var(--summit);
}

/* scene dots */
.dots-row {
  display: flex;
  gap: 7px;
  align-items: center;
  margin-bottom: 1.1rem;
}
.sdot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s, width 0.3s;
}
.sdot.on {
  background: var(--summit);
  transform: scale(1.5);
}

/* control buttons */
.ctrl-row {
  display: flex;
  gap: 0.65rem;
  align-items: center;
  margin-bottom: 0.8rem;
}
.ctrl-btn {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.5rem 1rem;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover { border-color: #444; color: var(--chalk); }
.ctrl-btn.primary {
  background: var(--summit);
  border-color: var(--summit);
  color: #fff;
}
.ctrl-btn.primary:hover { opacity: 0.85; }
.ctrl-btn.paused {
  background: transparent;
  border-color: #333;
  color: var(--muted);
}

.kb-hint {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.12em;
  color: var(--dim);
  line-height: 1.7;
}

/* ── RIGHT PANEL ─────────────────────────── */
.panel-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  background:
    radial-gradient(ellipse 60% 60% at 80% 20%, rgba(255,122,24,0.06) 0%, transparent 65%),
    #05060a;
  position: relative;
  overflow: hidden;
}

/* screen tab hint — top of right panel */
.screen-tab {
  position: absolute;
  top: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  padding: 0.32rem 0.85rem;
  border-radius: 2px;
  white-space: nowrap;
  z-index: 5;
  transition: opacity 0.3s;
}
.screen-tab-arrow {
  color: var(--summit);
  font-size: 0.7rem;
}

.phone-hint {
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  position: relative;
  z-index: 2;
}

/* ── PHONE MOCKUP ────────────────────────── */
.phone {
  width: var(--pw);
  height: var(--ph);
  position: relative;
  flex-shrink: 0;
  z-index: 2;
}
.phone-shell {
  width: 100%; height: 100%;
  border-radius: 46px;
  background: linear-gradient(160deg, #28303e 0%, #1a1f2c 50%, #131720 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.10),
    0 0 0 1px rgba(140,150,170,0.40),
    0 0 0 2.5px rgba(80,90,110,0.25),
    0 0 0 4px #050508,
    0 80px 150px rgba(0,0,0,0.85),
    0 0 90px rgba(255,122,24,0.09);
  padding: 10px 8px 14px;
  display: flex;
  flex-direction: column;
}
.phone-screen {
  flex: 1;
  border-radius: 38px;
  overflow: hidden;
  background: #080c14;
  position: relative;
}
.phone-iframe-wrap {
  position: absolute; inset: 0;
  overflow: hidden;
}
.phone-iframe-wrap iframe {
  width: 390px;
  height: 852px;
  border: none;
  display: block;
  transform: scale(0.908);
  transform-origin: top left;
}
/* loading placeholder */
.ph {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: 2rem;
  text-align: center;
  background: linear-gradient(160deg, #0f1928, #08111f);
  pointer-events: none;
  transition: opacity 0.5s;
}
.ph.hidden { opacity: 0; pointer-events: none; }
.ph-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem;
  letter-spacing: 0.1em;
  color: var(--summit);
}
.ph-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--summit);
  animation: pulse 2s ease-in-out infinite;
}
.ph-hint {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: var(--dim);
  line-height: 1.9;
}
.phone-home-bar {
  width: 80px; height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.22);
  margin: 7px auto 0;
  flex-shrink: 0;
}
/* side buttons */
.pbtn {
  position: absolute; border-radius: 3px;
  background: linear-gradient(to right, #222736, #1a1f2c);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 0 0 1px rgba(140,150,170,0.22);
}
.pbtn-v1 { left:-5px; top:108px; width:4px; height:36px; }
.pbtn-v2 { left:-5px; top:154px; width:4px; height:36px; }
.pbtn-pw { right:-5px; top:128px; width:4px; height:62px; }
.phone-sheen {
  position: absolute; inset: 0;
  border-radius: 46px;
  pointer-events: none;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 40%);
}

/* ── ANIMATIONS ──────────────────────────── */
@keyframes lineIn {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes chipIn {
  to { opacity: 1; }
}
@keyframes pulse {
  0%,100% { opacity:.4; transform:scale(1); }
  50%      { opacity:1;  transform:scale(1.25); }
}

/* ── RESPONSIVE PHONE SCALE ──────────────── */
@media (max-height: 860px) {
  .phone { transform: scale(0.84); transform-origin: center center; }
}
@media (max-height: 720px) {
  .phone { transform: scale(0.70); transform-origin: center center; }
}
@media (max-width: 1000px) {
  .panel-left { padding: 2rem 2.5rem; }
}
</style>
</head>
<body>

<div class="demo-wrap">

  <!-- ════════════════ LEFT PANEL ════════════════ -->
  <div class="panel-left">

    <!-- Logo row -->
    <div class="pl-top">
      <div class="pl-logo">BetaUp</div>
      <div class="pl-meta">CPT208 · Group C2-6</div>
      <a class="pl-portfolio" href="index.html">Portfolio →</a>
    </div>

    <!-- Scene counter -->
    <div class="pl-counter">
      <span class="pl-cur" id="sc-num">01</span>
      <span class="pl-sep">&nbsp;/&nbsp;</span>
      <span class="pl-tot" id="sc-tot">07</span>
    </div>

    <!-- ── ANIMATED SCENE CONTENT ── -->
    <div class="scene-content" id="scene-content">
      <div class="sc-tag" id="sc-tag"></div>
      <h2 class="sc-title" id="sc-title"></h2>
      <div class="sc-lines" id="sc-lines"></div>
      <div class="sc-chips" id="sc-chips"></div>
    </div>

    <!-- ── CONTROLS ── -->
    <div class="panel-controls">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="dots-row" id="dots-row"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-prev">← Prev</button>
        <button class="ctrl-btn primary" id="btn-auto">⏸ Pause</button>
        <button class="ctrl-btn" id="btn-next">Next →</button>
      </div>
      <div class="kb-hint">
        SPACE · → &nbsp; advance &nbsp;·&nbsp; ← &nbsp; back &nbsp;·&nbsp; P &nbsp; pause/resume<br>
        Auto-advances every 12 seconds
      </div>
    </div>

  </div><!-- /panel-left -->


  <!-- ════════════════ RIGHT PANEL ════════════════ -->
  <div class="panel-right">

    <!-- Current feature hint -->
    <div class="screen-tab" id="screen-tab">
      <span class="screen-tab-arrow">→</span>
      <span id="screen-tab-text">Overview</span>
    </div>

    <!-- Phone mockup -->
    <div class="phone">
      <div class="phone-shell">
        <div class="phone-screen">
          <div class="phone-iframe-wrap">
            <iframe id="app-frame" src="./app/index.html" title="BetaUp"></iframe>
            <div class="ph" id="app-ph">
              <div class="ph-logo">BETAUP</div>
              <div class="ph-dot"></div>
              <p class="ph-hint">Loading app…</p>
            </div>
          </div>
        </div>
        <div class="phone-home-bar"></div>
      </div>
      <div class="pbtn pbtn-v1"></div>
      <div class="pbtn pbtn-v2"></div>
      <div class="pbtn pbtn-pw"></div>
      <div class="phone-sheen"></div>
    </div>

    <div class="phone-hint">Live app — click to explore</div>

  </div><!-- /panel-right -->

</div><!-- /demo-wrap -->


<script>
// ════════════════════════════════════════════════
//  SCENE DATA
// ════════════════════════════════════════════════
const SCENES = [
  {
    tag: 'Welcome to BetaUp',
    title: 'THE CLIMBING\nCOMPANION\nYOU <em>NEED</em>',
    lines: [
      'Built for gym climbers at every level',
      'From first V0 to projecting V11',
      'Log, connect, and grow — all in one app',
      'Web, iOS, and Android from one codebase',
    ],
    chips: [
      { text: 'Flutter · Dart', cls: 'c-b' },
      { text: 'Spring Boot 3', cls: 'c-o' },
      { text: 'DeepSeek AI', cls: 'c-g' },
    ],
    screen: 'Overview',
  },
  {
    tag: 'Explore',
    title: 'FIND YOUR\nNEXT <em>GYM</em>',
    lines: [
      'GPS-powered map shows gyms near you',
      'Wall types, opening hours, and distance',
      'Filter by indoor bouldering, lead, or sport',
      'Tap any venue to log your session there',
    ],
    chips: [
      { text: 'Live Map', cls: 'c-b' },
      { text: 'GPS Discovery', cls: 'c-g' },
      { text: 'Venue Details', cls: 'c-y' },
    ],
    screen: 'Explore Tab',
  },
  {
    tag: 'Session Logging',
    title: 'LOG EVERY\n<em>SEND</em>',
    lines: [
      'Start a session at any gym in seconds',
      'Select grade, wall type, and outcome',
      'Flash, send, or mark it as a project',
      'Under 10 seconds per climb — zero friction',
    ],
    chips: [
      { text: 'V-Scale · French', cls: 'c-o' },
      { text: 'Flash Rate', cls: 'c-g' },
      { text: 'Session Streaks', cls: 'c-b' },
    ],
    screen: 'Train Tab → Log',
  },
  {
    tag: 'Progress Tracking',
    title: 'WATCH\nYOURSELF\n<em>GROW</em>',
    lines: [
      'Weekly frequency bar chart — animated',
      'Grade distribution donut, see your range',
      'Best grade, flash rate, total sessions',
      '8 Weeks · 6 Months · All Time filters',
    ],
    chips: [
      { text: 'Live Charts', cls: 'c-b' },
      { text: 'Grade Stats', cls: 'c-o' },
      { text: 'Trend View', cls: 'c-g' },
    ],
    screen: 'Train Tab → Progress',
  },
  {
    tag: 'Achievements',
    title: 'EARN YOUR\n<em>BADGES</em>',
    lines: [
      '20+ badges unlock automatically at milestones',
      'First send, V5, 7-day streak, 10 sessions…',
      'Animated celebration on every unlock',
      'Badges displayed publicly on your profile',
    ],
    chips: [
      { text: 'Milestone Unlocks', cls: 'c-y' },
      { text: 'Animated Reveal', cls: 'c-o' },
      { text: 'XP + Levels', cls: 'c-g' },
    ],
    screen: 'Train Tab → Badges',
  },
  {
    tag: 'Community',
    title: 'CLIMB\n<em>TOGETHER</em>',
    lines: [
      'Post your sends to the community feed',
      'Like, comment, and follow other climbers',
      'Weekly leaderboard — top performers ranked',
      'Coach certification built into the app',
    ],
    chips: [
      { text: 'Community Feed', cls: 'c-b' },
      { text: 'Follow Graph', cls: 'c-o' },
      { text: 'Coach Certs', cls: 'c-g' },
    ],
    screen: 'Community Tab',
  },
  {
    tag: 'AI Voice Assistant',
    title: 'MEET\n<em>PANDA</em>',
    lines: [
      'Tap the panda avatar to enter voice mode',
      '"Flash on the blue slab, V4" — saved instantly',
      'Powered by DeepSeek NLP + Web Speech API',
      'Fully hands-free, even mid-climb',
    ],
    chips: [
      { text: 'DeepSeek NLP', cls: 'c-o' },
      { text: 'Web Speech API', cls: 'c-b' },
      { text: 'Hands-Free', cls: 'c-g' },
    ],
    screen: 'Voice Assistant',
  },
];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const AUTO_MS   = 12000;
let cur         = 0;
let autoPlay    = true;
let rafId       = null;
let startTime   = null;

// ── Elements ──
const contentEl  = document.getElementById('scene-content');
const tagEl      = document.getElementById('sc-tag');
const titleEl    = document.getElementById('sc-title');
const linesEl    = document.getElementById('sc-lines');
const chipsEl    = document.getElementById('sc-chips');
const numEl      = document.getElementById('sc-num');
const totEl      = document.getElementById('sc-tot');
const fillEl     = document.getElementById('progress-fill');
const dotsRow    = document.getElementById('dots-row');
const btnAuto    = document.getElementById('btn-auto');
const screenTab  = document.getElementById('screen-tab-text');

// ── Set total ──
totEl.textContent = String(SCENES.length).padStart(2, '0');

// ── Build dots ──
SCENES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'sdot' + (i === 0 ? ' on' : '');
  d.addEventListener('click', () => { stopProgress(); goTo(i, i > cur ? 1 : -1); });
  dotsRow.appendChild(d);
});

// ════════════════════════════════════════════════
//  RENDER SCENE
// ════════════════════════════════════════════════
function renderScene(idx) {
  const s = SCENES[idx];

  numEl.textContent    = String(idx + 1).padStart(2, '0');
  tagEl.textContent    = s.tag;
  titleEl.innerHTML    = s.title.replace(/\n/g, '<br>');
  screenTab.textContent = s.screen;

  // Lines with staggered delay
  linesEl.innerHTML = s.lines.map((l, i) =>
    `<div class="sc-line" style="animation-delay:${0.08 + i * 0.11}s">${l}</div>`
  ).join('');

  // Chips after lines
  const chipBase = 0.08 + s.lines.length * 0.11 + 0.08;
  chipsEl.innerHTML = s.chips.map((c, i) =>
    `<span class="chip ${c.cls}" style="animation-delay:${chipBase + i * 0.07}s">${c.text}</span>`
  ).join('');

  // Update dots
  document.querySelectorAll('.sdot').forEach((d, i) =>
    d.classList.toggle('on', i === idx)
  );
}

// ════════════════════════════════════════════════
//  TRANSITION
// ════════════════════════════════════════════════
let transitioning = false;

function goTo(idx, dir) {
  if (transitioning) return;
  idx = ((idx % SCENES.length) + SCENES.length) % SCENES.length;
  if (idx === cur) { if (autoPlay) startProgress(); return; }

  transitioning = true;

  // Exit: slide out
  contentEl.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
  contentEl.style.opacity    = '0';
  contentEl.style.transform  = `translateX(${dir > 0 ? -32 : 32}px)`;

  setTimeout(() => {
    cur = idx;
    renderScene(cur);

    // Position for entrance
    contentEl.style.transition  = 'none';
    contentEl.style.opacity     = '0';
    contentEl.style.transform   = `translateX(${dir > 0 ? 32 : -32}px)`;

    // Trigger reflow then animate in
    requestAnimationFrame(() => requestAnimationFrame(() => {
      contentEl.style.transition = 'opacity 0.38s ease, transform 0.38s ease';
      contentEl.style.opacity    = '1';
      contentEl.style.transform  = 'translateX(0)';
      transitioning = false;
      if (autoPlay) startProgress();
    }));
  }, 300);
}

// ════════════════════════════════════════════════
//  AUTO PROGRESS BAR (rAF-driven)
// ════════════════════════════════════════════════
function startProgress() {
  stopProgress();
  fillEl.style.transition = 'none';
  fillEl.style.width      = '0%';
  startTime = null;

  function tick(ts) {
    if (!startTime) startTime = ts;
    const pct = Math.min((ts - startTime) / AUTO_MS * 100, 100);
    fillEl.style.width = pct + '%';

    if (pct < 100) {
      rafId = requestAnimationFrame(tick);
    } else {
      // Advance to next scene
      const next = (cur + 1) % SCENES.length;
      goTo(next, 1);
    }
  }
  rafId = requestAnimationFrame(tick);
}

function stopProgress() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// ════════════════════════════════════════════════
//  AUTO TOGGLE
// ════════════════════════════════════════════════
function toggleAuto() {
  autoPlay = !autoPlay;
  if (autoPlay) {
    btnAuto.textContent = '⏸ Pause';
    btnAuto.classList.add('primary');
    btnAuto.classList.remove('paused');
    startProgress();
  } else {
    btnAuto.textContent = '▶ Auto';
    btnAuto.classList.remove('primary');
    btnAuto.classList.add('paused');
    stopProgress();
    fillEl.style.width = '0%';
  }
}

// ════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════
document.getElementById('btn-prev').addEventListener('click', () => {
  stopProgress(); goTo(cur - 1, -1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  stopProgress(); goTo(cur + 1, 1);
});
btnAuto.addEventListener('click', toggleAuto);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'ArrowRight' || e.code === 'Space') {
    e.preventDefault();
    stopProgress();
    goTo(cur + 1, 1);
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    stopProgress();
    goTo(cur - 1, -1);
  } else if (e.code === 'KeyP') {
    toggleAuto();
  }
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
renderScene(0);
contentEl.style.opacity   = '1';
contentEl.style.transform = 'translateX(0)';
startProgress();

// Hide loading placeholder
const appFrame = document.getElementById('app-frame');
const appPh    = document.getElementById('app-ph');
appFrame.addEventListener('load', () => {
  setTimeout(() => appPh.classList.add('hidden'), 300);
});
</script>
</body>
