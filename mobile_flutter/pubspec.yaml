name: betaup_mobile
description: Flutter mobile client for BetaUp backed by the existing Spring Boot API.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  webview_flutter: ^4.10.0
  geolocator: ^13.0.2
  confetti: ^0.8.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1
  video_player: ^2.9.2
  video_player_win: ^3.1.1
  flutter_blue_plus: ^1.34.0
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/map/map.html

