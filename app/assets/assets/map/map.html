<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <title>BetaUp 攀岩馆地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }
  </style>
  <!-- 高德地图 JS API — 请替换 YOUR_AMAP_KEY 为你的真实 key -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY"></script>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = new AMap.Map('map', {
      zoom: 5,
      center: [104.0, 35.5],  // 中国中心
      mapStyle: 'amap://styles/normal'
    });

    var markers = [];
    var gyms = [];

    // Called by Flutter with JSON array of gym objects
    function loadGyms(jsonStr) {
      gyms = JSON.parse(jsonStr);
      markers.forEach(function(m) { m.setMap(null); });
      markers = [];

      gyms.forEach(function(gym) {
        var marker = new AMap.Marker({
          position: [gym.lng, gym.lat],
          title: gym.name,
          map: map
        });

        // Orange dot for climbing gyms
        marker.setIcon(new AMap.Icon({
          size: new AMap.Size(32, 32),
          image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">' +
            '<circle cx="16" cy="14" r="10" fill="#FF6B35" stroke="white" stroke-width="2"/>' +
            '<text x="16" y="18" font-size="12" text-anchor="middle" fill="white">🧗</text>' +
            '</svg>'
          ),
          imageSize: new AMap.Size(32, 32)
        }));

        marker.on('click', function() {
          // Send gym data back to Flutter via JavascriptChannel
          if (window.FlutterChannel) {
            window.FlutterChannel.postMessage(JSON.stringify({
              action: 'gymSelected',
              gym: gym
            }));
          }
        });

        markers.push(marker);
      });

      // Auto-fit map bounds if gyms exist
      if (markers.length > 0) {
        map.setFitView(markers, false, [20, 20, 20, 20]);
      }
    }

    // Called by Flutter to locate to user position
    function locateUser(lat, lng) {
      map.setCenter([lng, lat]);
      map.setZoom(13);
      var userMarker = new AMap.Marker({
        position: [lng, lat],
        title: '我的位置',
        map: map,
        zIndex: 200
      });
      userMarker.setIcon(new AMap.Icon({
        size: new AMap.Size(24, 24),
        image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
          '<circle cx="12" cy="12" r="9" fill="#4285F4" stroke="white" stroke-width="2"/>' +
          '<circle cx="12" cy="12" r="4" fill="white"/>' +
          '</svg>'
        ),
        imageSize: new AMap.Size(24, 24)
      }));
    }
  </script>
</body>
</html>
