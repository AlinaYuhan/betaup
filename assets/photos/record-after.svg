        <path d="M-41 32 C-34 15 -9 15 -2 32 M4 32 C11 15 36 15 43 32" fill="none" stroke="#dcd3c8" stroke-width="5" stroke-linecap="round"/>
        <text class="font" x="0" y="74" text-anchor="middle" fill="#a6afc1" font-size="27" font-weight="700">Community</text>
      </g>
      <g transform="translate(756 44)">
