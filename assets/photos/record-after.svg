        <path d="M-17 2 L0 -15 L14 -1 L6 7 L31 32 L22 41 L-3 16 L-12 24 Z" fill="#fff0e9"/>
        <text class="font white" x="0" y="78" text-anchor="middle" font-size="28" font-weight="900">Train</text>
      </g>
      <g transform="translate(540 44)">
        <circle cx="-17" cy="-2" r="12" fill="none" stroke="#dcd3c8" stroke-width="5"/>
