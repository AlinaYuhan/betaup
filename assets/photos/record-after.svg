<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="Record page after redesign">
  <defs>
    <clipPath id="screenClip">
      <rect width="1080" height="1920"/>
    </clipPath>
    <linearGradient id="photoFallback" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5a5f55"/>
      <stop offset="0.45" stop-color="#7c483e"/>
      <stop offset="1" stop-color="#161d2c"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000815" stop-opacity="0.18"/>
      <stop offset="0.38" stop-color="#020712" stop-opacity="0.28"/>
      <stop offset="0.56" stop-color="#050b17" stop-opacity="0.62"/>
      <stop offset="0.78" stop-color="#07101e" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#07101e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#131c2f"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="navPill" x1="0" x2="1">
      <stop offset="0" stop-color="#2d332f"/>
      <stop offset="1" stop-color="#70442d"/>
    </linearGradient>
    <radialGradient id="button" cx="50%" cy="38%" r="70%">
      <stop offset="0" stop-color="#928b82"/>
      <stop offset="0.65" stop-color="#6f6861"/>
      <stop offset="1" stop-color="#484640"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
    <style>
      .font { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "Arial Narrow", Arial, sans-serif; letter-spacing: 5px; }
      .white { fill: #f8f8f5; }
      .muted { fill: #8690a6; }
      .blueText { fill: #54627e; }
    </style>
  </defs>

  <g clip-path="url(#screenClip)">
    <rect width="1080" height="1920" fill="#07101e"/>
    <rect width="1080" height="860" fill="url(#photoFallback)"/>
    <image href="../../mobile_flutter/assets/images/climb_wall.jpg" x="-132" y="-42" width="1344" height="2016" preserveAspectRatio="xMidYMin slice" opacity="0.72"/>
    <rect width="1080" height="1920" fill="url(#fade)"/>
    <rect width="1080" height="1920" filter="url(#grain)" opacity="0.55"/>

    <rect x="0" y="0" width="1080" height="104" fill="#090f1d"/>
    <rect x="720" y="0" width="360" height="104" fill="#1b202d" opacity="0.9"/>
