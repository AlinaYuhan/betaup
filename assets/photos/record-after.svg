        <path d="M-9 11 L8 -13 L12 -7 L-6 15 Z" fill="#dcd3c8"/>
        <text class="font" x="0" y="74" text-anchor="middle" fill="#a6afc1" font-size="27" font-weight="700">Explore</text>
      </g>
      <g transform="translate(324 42)">
