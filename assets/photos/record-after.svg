      <text class="mono" x="0" y="44" text-anchor="middle" fill="#f8d945" font-size="21" font-weight="900">FLASH</text>
      <text class="font" x="0" y="126" text-anchor="middle" fill="#73e488" font-size="78" font-weight="900">4</text>
      <text class="mono" x="0" y="170" text-anchor="middle" fill="#73e488" font-size="21" font-weight="900">SEND</text>
      <text class="font" x="0" y="238" text-anchor="middle" fill="#aaa9a3" font-size="38" font-weight="900">C</text>
