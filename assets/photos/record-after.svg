      <text class="font blueText" x="422" y="220" text-anchor="middle" font-size="28" font-weight="900">Attempt 0</text>
      <rect x="852" y="36" width="94" height="78" rx="16" fill="#493e2b" stroke="#a18b25" stroke-width="2"/>
      <text class="font" x="899" y="89" text-anchor="middle" fill="#f1cd35" font-size="42" font-weight="900">V6</text>
    </g>

    <g transform="translate(48 1356)" filter="url(#shadow)">
      <rect width="984" height="270" rx="31" fill="url(#card)" stroke="#29354b" stroke-width="3"/>
      <text class="font white" x="40" y="80" font-size="38" font-weight="900">考拉攀岩(狮山店)</text>
      <text class="font blueText" x="40" y="137" font-size="27" font-weight="800">MAY 5 · 22:02 · 11秒 · 0 logs</text>
      <rect x="40" y="178" width="132" height="70" rx="16" fill="#132033" opacity="0.9"/>
      <text class="font blueText" x="106" y="220" text-anchor="middle" font-size="28" font-weight="900">Flash 0</text>
      <rect x="190" y="178" width="132" height="70" rx="16" fill="#132033" opacity="0.9"/>
      <text class="font blueText" x="256" y="220" text-anchor="middle" font-size="28" font-weight="900">Send 0</text>
      <rect x="340" y="178" width="164" height="70" rx="16" fill="#132033" opacity="0.9"/>
      <text class="font blueText" x="422" y="220" text-anchor="middle" font-size="28" font-weight="900">Attempt 0</text>
