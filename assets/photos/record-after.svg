      <circle r="54" fill="#ffffff"/>
      <circle cx="-32" cy="-46" r="17" fill="#2f3338"/>
      <circle cx="32" cy="-46" r="17" fill="#2f3338"/>
      <ellipse cx="-22" cy="-8" rx="21" ry="25" fill="#34383d"/>
      <ellipse cx="22" cy="-8" rx="21" ry="25" fill="#34383d"/>
      <circle cx="-22" cy="-8" r="10" fill="#ffffff"/>
      <circle cx="22" cy="-8" r="10" fill="#ffffff"/>
      <circle cx="-20" cy="-8" r="4" fill="#34383d"/>
      <circle cx="20" cy="-8" r="4" fill="#34383d"/>
      <ellipse cx="0" cy="18" rx="11" ry="8" fill="#34383d"/>
      <path d="M-18 40 C-6 49 6 49 18 40" fill="none" stroke="#34383d" stroke-width="5" stroke-linecap="round"/>
