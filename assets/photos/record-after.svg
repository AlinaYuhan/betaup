      <text class="font" x="0" y="171" fill="#d2ccc6" font-size="25" font-weight="800">10 sessions this month</text>
      <path d="M6 221 C-4 211 -4 194 7 184 C18 197 28 201 43 199 C45 215 54 225 67 237 C50 241 37 236 29 221 C19 225 12 224 6 221 Z" fill="#adaaa9" opacity="0.7"/>
