<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="Record page before redesign">
  <defs>
    <linearGradient id="pageBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#090d1a"/>
      <stop offset="0.55" stop-color="#080d19"/>
      <stop offset="1" stop-color="#10172a"/>
    </linearGradient>
    <linearGradient id="topCard" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6f3d22"/>
      <stop offset="0.48" stop-color="#4c2e22"/>
      <stop offset="1" stop-color="#151923"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151d30"/>
      <stop offset="0.62" stop-color="#101728"/>
      <stop offset="1" stop-color="#101522"/>
    </linearGradient>
    <linearGradient id="tabPill" x1="0" x2="1">
      <stop offset="0" stop-color="#2c2f2c"/>
      <stop offset="1" stop-color="#7b442b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="orangeGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#f0832f" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="70" flood-color="#f0832f" flood-opacity="0.28"/>
    </filter>
    <filter id="mutedBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <style>
      .font { font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "Arial Narrow", Arial, "PingFang SC", sans-serif; letter-spacing: 3px; }
      .muted { fill: #777d90; }
      .dim { fill: #575d6d; }
      .white { fill: #f6f6f2; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#pageBg)"/>
  <rect x="0" y="272" width="1080" height="1" fill="#1c2130"/>
  <rect x="0" y="278" width="1080" height="2" fill="#151a27"/>

  <text class="font white" x="14" y="72" font-size="54" font-weight="900">记录</text>

