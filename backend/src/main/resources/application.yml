server:
  port: 8080

spring:
  datasource:
    url: ${BETAUP_DB_URL:jdbc:mysql://127.0.0.1:3306/cpt208?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${BETAUP_DB_USERNAME:root}
    password: ${BETAUP_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${BETAUP_JWT_SECRET:betaUpRoundOneSecretKeyChangeMe1234567890}
    expiration-ms: ${BETAUP_JWT_EXPIRATION_MS:86400000}
