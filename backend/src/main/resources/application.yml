server:
  port: ${PORT:8080}

spring:
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origin-patterns: ${BETAUP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    secret: ${BETAUP_JWT_SECRET:betaUpRoundOneSecretKeyChangeMe1234567890}
    expiration-ms: ${BETAUP_JWT_EXPIRATION_MS:86400000}
  upload:
    dir: ${BETAUP_UPLOAD_DIR:${user.home}/.betaup-uploads}
  amap:
    js-key: ${AMAP_JS_KEY:}
    js-security-code: ${AMAP_JS_SECURITY_CODE:}
    web-service-key: ${AMAP_WEB_SERVICE_KEY:}
    geocode-url: ${AMAP_GEOCODE_URL:https://restapi.amap.com/v3/geocode/geo}
  voice:
    deepseek-api-key: ${BETAUP_DEEPSEEK_API_KEY:}
    deepseek-endpoint: ${BETAUP_DEEPSEEK_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
    deepseek-model: ${BETAUP_DEEPSEEK_MODEL:deepseek-chat}
